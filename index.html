<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- VERIFICAÇÃO GOOGLE -->
  <meta name="google-site-verification" content="SEU_CODIGO_AQUI">

  <!-- SEO -->
  <title>Hora em Brasília (Atualizada) | Relógio Online</title>
  <meta name="description" content="Veja a hora em Brasília atualizada em tempo real com relógio online simples e rápido.">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1f3a; /* azul escuro */
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    #clock {
      font-size: 90px;
      font-weight: bold;
      margin: 10px 0;
    }

    #date {
      font-size: 28px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Hora em Brasília</h1>

<div id="clock">00:00:00</div>
<div id="date"></div>

<script>
  function updateClock() {
    const now = new Date();

    const time = now.toLocaleTimeString("pt-BR", {
      timeZone: "America/Sao_Paulo"
    });

    const date = now.toLocaleDateString("pt-BR", {
      timeZone: "America/Sao_Paulo",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

    document.getElementById("clock").textContent = time;
    document.getElementById("date").textContent = date;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
