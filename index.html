<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- VERIFICAÇÃO GOOGLE -->
  <meta name="google-site-verification" content="SEU_CODIGO_AQUI">

  <!-- SEO -->
  <title>Hora em Brasília | Relógio Online Grande</title>
  <meta name="description" content="Veja a hora em Brasília com relógio online grande, atualizado em tempo real.">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #ff9900;
      text-align: center;
    }

    .container {
      height: 75vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      color: white;
      font-size: 28px;
      margin-bottom: 20px;
    }

    #clock {
      font-size: 120px;
      font-weight: bold;
      letter-spacing: 5px;
    }

    #date {
      font-size: 32px;
      margin-top: 20px;
    }

    /* ÁREA DE ANÚNCIO */
    .ad-area {
      height: 120px;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Hora em Brasília</h1>
  <div id="clock">00:00:00</div>
  <div id="date"></div>
</div>

<div class="ad-area">
  <!-- COLE AQUI SEU ANÚNCIO (ADSENSE FUTURO) -->
  Espaço para anúncio
</div>

<script>
  function updateClock() {
    const now = new Date();

    const time = now.toLocaleTimeString("pt-BR", {
      timeZone: "America/Sao_Paulo"
    });

    const date = now.toLocaleDateString("pt-BR", {
      timeZone: "America/Sao_Paulo",
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

    document.getElementById("clock").textContent = time;
    document.getElementById("date").textContent = date;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
