<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hora Certa em Brasília Agora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Veja a hora certa em Brasília atualizada em tempo real. Relógio online oficial do Brasil.">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* Topo tipo site grande */
.header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* Conteúdo central */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 80vh;
  text-align: center;
}

/* Relógio gigante */
#clock {
  font-size: 120px;
  font-weight: bold;
  margin: 20px 0;
}

/* Data */
#date {
  font-size: 24px;
  margin-bottom: 20px;
}

/* Texto */
.text {
  max-width: 800px;
  font-size: 18px;
  opacity: 0.9;
}

/* Rodapé */
.footer {
  background: #020617;
  text-align: center;
  padding: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
Hora Certa do Brasil
</div>

<div class="container">
  <h1>Hora de Brasília Agora</h1>
  
  <div id="clock"></div>
  <div id="date"></div>

  <div class="text">
    Veja a hora oficial de Brasília atualizada em tempo real. Relógio online preciso para acompanhar o horário atual no Brasil.
  </div>
</div>

<div class="footer">
Relógio online atualizado automaticamente
</div>

<script>
function updateClock() {
  const now = new Date();

  const optionsTime = {
    timeZone: 'America/Sao_Paulo',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  };

  const optionsDate = {
    timeZone: 'America/Sao_Paulo',
    weekday: 'long',
    day: '2-digit',
    month: 'long',
    year: 'numeric'
  };

  document.getElementById('clock').innerHTML =
    now.toLocaleTimeString('pt-BR', optionsTime);

  document.getElementById('date').innerHTML =
    now.toLocaleDateString('pt-BR', optionsDate);
}

setInterval(updateClock, 1000);
updateClock();
</script>

</html>
