<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hora em Brasília Agora (Relógio Online em Tempo Real)</title>
  <meta name="description" content="Veja a hora exata em Brasília com relógio grande e atualização em tempo real. Simples, rápido e preciso.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    #clock {
      font-size: 110px;
      font-weight: bold;
      letter-spacing: 4px;
    }

    #date {
      margin-top: 10px;
      font-size: 20px;
      opacity: 0.7;
    }

    .info {
      max-width: 600px;
      margin-top: 40px;
      font-size: 16px;
      opacity: 0.8;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      #clock {
        font-size: 60px;
      }
    }
  </style>
</head>

<body>

<h1>Hora em Brasília Agora</h1>

<div id="clock">--:--:--</div>
<div id="date"></div>

<div class="info">
  A hora atual em Brasília (Brasil) é atualizada automaticamente em tempo real,
  com base no horário oficial (UTC -3).
</div>

<script>
function updateClock() {
  const now = new Date();

  const time = now.toLocaleTimeString('pt-BR', {
    timeZone: 'America/Sao_Paulo'
  });

  const date = now.toLocaleDateString('pt-BR', {
    timeZone: 'America/Sao_Paulo',
    weekday: 'long',
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });

  document.getElementById('clock').textContent = time;
  document.getElementById('date').textContent = date;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
