#date { font-size:20px; opacity:0.8; margin-bottom:30px; }
#menu { display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }

.info { max-width:700px; margin:40px auto; opacity:0.8; line-height:1.5; }
footer { margin-top:50px; font-size:14px; opacity:0.6; }

// Cria o menu de botões
const menu = document.getElementById('menu');
cidades.forEach(cidade => {
  const btn = document.createElement('button');
  btn.textContent = cidade.nome;
  btn.onclick = () => {
    cidadeAtual = cidade;
    document.getElementById('titulo').textContent = "Hora em " + cidade.nome + " Agora";
  };
  menu.appendChild(btn);
});

// Atualiza o relógio
function atualizarRelogio() {
  const now = new Date();
  const time = now.toLocaleTimeString('pt-BR',{timeZone:cidadeAtual.tz});
  const date = now.toLocaleDateString('pt-BR',{timeZone:cidadeAtual.tz, weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('clock').textContent = time;
  document.getElementById('date').textContent = date;
}
setInterval(atualizarRelogio,1000);
