<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hora Certa em Brasília Agora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Veja a hora certa em Brasília atualizada em tempo real. Relógio online oficial do Brasil.">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1d3557, #457b9d);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container central */
.container {
  text-align: center;
}

/* Título */
h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

/* Relógio gigante */
#clock {
  font-size: 90px;
  font-weight: bold;
  margin: 20px 0;
}

/* Data */
#date {
  font-size: 22px;
  margin-bottom: 20px;
}

/* Texto */
p {
  font-size: 16px;
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hora Certa em Brasília</h1>
  
  <div id="clock"></div>
  <div id="date"></div>

  <p>Relógio online atualizado em tempo real</p>
</div>

<script>
function updateClock() {
  const now = new Date();

  const optionsTime = {
    timeZone: 'America/Sao_Paulo',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  };

  const optionsDate = {
    timeZone: 'America/Sao_Paulo',
    weekday: 'long',
    day: '2-digit',
    month: 'long',
    year: 'numeric'
  };

  document.getElementById('clock').innerHTML =
    now.toLocaleTimeString('pt-BR', optionsTime);

  document.getElementById('date').innerHTML =
    now.toLocaleDateString('pt-BR', optionsDate);
}

setInterval(updateClock, 1000);
updateClock();
</script>
