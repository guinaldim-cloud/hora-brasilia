<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hora Atual no Mundo (Relógio Online em Tempo Real)</title>
  <meta name="description" content="Veja a hora exata em várias cidades do mundo com relógio grande e atualizado em tempo real.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-top: 20px;
    }

    #clock {
      font-size: 90px;
      font-weight: bold;
      margin: 20px 0;
    }

    #date {
      font-size: 20px;
      opacity: 0.8;
    }

    #menu {
      margin-top: 30px;
    }

    #menu button {
      margin: 5px;
      padding: 10px 14px;
      border: none;
      background: #0ea5e9;
      color: #000;
      border-radius: 6px;
      cursor: pointer;
    }

    #menu button:hover {
      background: #38bdf8;
    }

    .info {
      max-width: 600px;
      margin: 40px auto;
      opacity: 0.8;
      line-height: 1.5;
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      #clock {
        font-size: 55px;
      }
    }
  </style>
</head>

<body>

<h1 id="titulo">Hora em Brasília Agora</h1>

<div id="clock">--:--:--</div>
<div id="date"></div>

<div id="menu"></div>

<div class="info">
  Veja a hora exata atualizada em tempo real em várias cidades do mundo.
</div>

<footer>
  <p>Portal de horários online</p>
</footer>

<script>
const cidades = [
  { nome: "Brasília", tz: "America/Sao_Paulo" },
  { nome: "São Paulo", tz: "America/Sao_Paulo" },
  { nome: "Rio de Janeiro", tz: "America/Sao_Paulo" },
  { nome: "New York", tz: "America/New_York" },
  { nome: "Los Angeles", tz: "America/Los_Angeles" },
  { nome: "Londres", tz: "Europe/London" },
  { nome: "Paris", tz: "Europe/Paris" },
  { nome: "Berlim", tz: "Europe/Berlin" },
  { nome: "Lisboa", tz: "Europe/Lisbon" },
  { nome: "Dubai", tz: "Asia/Dubai" },
  { nome: "Tóquio", tz: "Asia/Tokyo" },
  { nome: "Pequim", tz: "Asia/Shanghai" },
  { nome: "Sydney", tz: "Australia/Sydney" }
];

let cidadeAtual = cidades[0];

function criarMenu() {
  const menu = document.getElementById("menu");

  cidades.forEach(cidade => {
    const btn = document.createElement("button");
    btn.textContent = cidade.nome;

    btn.onclick = () => {
      cidadeAtual = cidade;
      document.getElementById("titulo").textContent =
        "Hora em " + cidade.nome + " Agora";
    };

    menu.appendChild(btn);
  });
}

function atualizarRelogio() {
  const now = new Date();

  const time = now.toLocaleTimeString("pt-BR", {
    timeZone: cidadeAtual.tz
  });

  const date = now.toLocaleDateString("pt-BR", {
    timeZone: cidadeAtual.tz,
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  });

  document.getElementById("clock").textContent = time;
  document.getElementById("date").textContent = date;
}

setInterval(atualizarRelogio, 1000);

criarMenu();
atualizarRelogio();
</script>

</body>
</html>
