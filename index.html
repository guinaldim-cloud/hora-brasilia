<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="SEU_CODIGO_AQUI">

<title>Hora em Brasília | Relógio Mundial</title>
<meta name="description" content="Veja a hora em Brasília e horários do mundo com relógio online profissional.">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: #0b1f3a;
  color: white;
}

/* MENU */
.sidebar {
  width: 220px;
  background: #08172b;
  height: 100vh;
  padding-top: 20px;
}

.sidebar h2 {
  text-align: center;
}

.menu-item {
  padding: 15px;
  cursor: pointer;
  border-bottom: 1px solid #0b1f3a;
}

.menu-item:hover {
  background: #0b1f3a;
}

/* CONTEÚDO */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* TELAS */
.screen {
  display: none;
  width: 100%;
}

.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* RELÓGIO */
#clock {
  font-size: 120px;
  font-weight: bold;
  letter-spacing: 4px;
  transition: all 0.3s ease;
}

#date {
  font-size: 26px;
  margin-top: 10px;
}

/* BOTÃO FULLSCREEN */
.fullscreen-btn {
  position: absolute;
  top: 15px;
  right: 20px;
  background: #08172b;
  border: none;
  color: white;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 8px;
}

/* MUNDO */
.world-container {
  margin-top: 40px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.world-box {
  background: #08172b;
  padding: 15px 25px;
  border-radius: 10px;
  font-size: 18px;
  min-width: 140px;
  transition: 0.3s;
}

.world-box:hover {
  transform: scale(1.05);
}

/* CRONÔMETRO */
#stopwatch {
  font-size: 70px;
}

/* ANÚNCIO */
.ad {
  position: fixed;
  bottom: 0;
  left: 220px;
  right: 0;
  height: 90px;
  background: #08172b;
  text-align: center;
  line-height: 90px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Ferramentas</h2>
  <div class="menu-item" onclick="showScreen('clockScreen')">Relógio</div>
  <div class="menu-item" onclick="showScreen('stopwatchScreen')">Cronômetro</div>
  <div class="menu-item" onclick="showScreen('timerScreen')">Temporizador</div>
</div>

<div class="content">

<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Tela cheia</button>

<!-- RELÓGIO -->
<div id="clockScreen" class="screen active">
  <h1>Hora em Brasília</h1>
  <div id="clock">00:00:00</div>
  <div id="date"></div>

  <div class="world-container">
    <div class="world-box"><strong>Nova York</strong><br><span id="ny"></span></div>
    <div class="world-box"><strong>Londres</strong><br><span id="london"></span></div>
    <div class="world-box"><strong>Tóquio</strong><br><span id="tokyo"></span></div>
    <div class="world-box"><strong>Paris</strong><br><span id="paris"></span></div>
    <div class="world-box"><strong>Dubai</strong><br><span id="dubai"></span></div>
  </div>
</div>

<!-- CRONÔMETRO -->
<div id="stopwatchScreen" class="screen">
  <h1>Cronômetro</h1>
  <div id="stopwatch">00:00:00</div>
</div>

<!-- TEMPORIZADOR -->
<div id="timerScreen" class="screen">
  <h1>Temporizador</h1>
</div>

</div>

<div class="ad">Espaço para anúncio</div>

<script>
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

/* FULLSCREEN */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* RELÓGIO */
function updateClock() {
  const now = new Date();

  function getTime(zone) {
    return now.toLocaleTimeString("pt-BR", { timeZone: zone });
  }

  document.getElementById("clock").textContent = getTime("America/Sao_Paulo");

  document.getElementById("date").textContent =
    now.toLocaleDateString("pt-BR", {
      timeZone: "America/Sao_Paulo",
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

  document.getElementById("ny").textContent = getTime("America/New_York");
  document.getElementById("london").textContent = getTime("Europe/London");
  document.getElementById("tokyo").textContent = getTime("Asia/Tokyo");
  document.getElementById("paris").textContent = getTime("Europe/Paris");
  document.getElementById("dubai").textContent = getTime("Asia/Dubai");
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
