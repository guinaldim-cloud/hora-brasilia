<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hora Atual no Mundo - Portal de Relógios</title>
<meta name="description" content="Veja a hora exata em tempo real em 100 cidades do mundo. Relógio gigante atualizado segundo a segundo.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Snippet do AdSense para verificação e ativação -->
<meta name="google-adsense-account" content="ca-pub-9099563604756004">
     
<style>
body { font-family: Arial, sans-serif; text-align:center; background:#020617; color:white; padding:20px; margin:0; }
h1 { font-size:32px; margin-bottom:20px; }
#clock { font-size:90px; font-weight:bold; margin:20px 0; }
#date { font-size:20px; opacity:0.8; margin-bottom:20px; }
#menu { display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }
#menu button { margin:5px; padding:10px 15px; border:none; border-radius:6px; background:#0ea5e9; color:#000; cursor:pointer; font-size:14px; }
#menu button:hover { background:#38bdf8; }
.info { max-width:700px; margin:40px auto; opacity:0.9; line-height:1.5; background:#11172b; padding:15px; border-radius:8px; }
footer { margin-top:50px; font-size:14px; opacity:0.6; }
@media(max-width:600px){#clock{font-size:55px;} #menu button{font-size:12px; padding:8px 12px;}}
</style>
</head>
<body>

<h1 id="titulo">Hora em Brasília Agora</h1>
<div id="clock">--:--:--</div>
<div id="date"></div>

<div id="menu"></div>

<div class="info" id="descricao">
Veja a hora exata em tempo real em 100 cidades do mundo. Clique no menu acima para mudar a cidade. Ideal para consultar horários globais rapidamente.
</div>

<footer>Portal de horários online</footer>

<script>
// Lista de cidades com timezone e curiosidades
const cidades = [
{nome:"Brasília", tz:"America/Sao_Paulo", desc:"Capital do Brasil, planejada e inaugurada em 1960. Conhecida pelo Congresso Nacional e pelo Palácio da Alvorada."},
{nome:"São Paulo", tz:"America/Sao_Paulo", desc:"Maior cidade do Brasil, centro financeiro e cultural, famosa pela Avenida Paulista e gastronomia diversificada."},
{nome:"Rio de Janeiro", tz:"America/Sao_Paulo", desc:"Cidade maravilhosa, conhecida pelo Cristo Redentor, Pão de Açúcar e pelas praias de Copacabana e Ipanema."},
{nome:"Belo Horizonte", tz:"America/Sao_Paulo", desc:"Capital de Minas Gerais, famosa pela arquitetura de Oscar Niemeyer e pela gastronomia mineira."},
{nome:"Curitiba", tz:"America/Sao_Paulo", desc:"Capital do Paraná, conhecida por planejamento urbano, transporte público eficiente e parques verdes."},
{nome:"Porto Alegre", tz:"America/Sao_Paulo", desc:"Capital do Rio Grande do Sul, famosa pela cultura gaúcha e gastronomia típica."},
{nome:"Salvador", tz:"America/Bahia", desc:"Primeira capital do Brasil, conhecida pelo Pelourinho, carnaval e culinária baiana."},
{nome:"Recife", tz:"America/Recife", desc:"Cidade pernambucana com rica história, pontes e rios, chamada de 'Veneza Brasileira'."},
{nome:"Fortaleza", tz:"America/Fortaleza", desc:"Capital do Ceará, famosa pelas praias e pelo clima tropical quente o ano inteiro."},
{nome:"Manaus", tz:"America/Manaus", desc:"Capital do Amazonas, porta de entrada para a Amazônia, famosa pelo Teatro Amazonas e pela floresta tropical."}
// Adicione mais cidades seguindo o mesmo padrão até 100...
];

// Seleção inicial
let cidadeAtual = cidades[0];

// Criar menu
const menu = document.getElementById('menu');
cidades.forEach(cidade=>{
  const btn = document.createElement('button');
  btn.textContent = cidade.nome;
  btn.onclick = ()=>{
    mudarCidade(cidade);
  };
  menu.appendChild(btn);
});

// Função para trocar cidade
function mudarCidade(cidade){
  cidadeAtual = cidade;
  document.getElementById('titulo').textContent = "Hora em "+cidade.nome+" Agora";
  document.getElementById('descricao').textContent = cidade.desc;
  document.title = "Hora em "+cidade.nome+" Agora - Portal de Relógios";
  document.querySelector('meta[name="description"]').setAttribute('content',"Veja a hora exata em "+cidade.nome+" em tempo real. "+cidade.desc);
  location.hash = cidade.nome.toLowerCase().replace(/\s/g,'-');
}

// Verifica hash ao carregar página
function verificarHash(){
  const hash = location.hash.replace('#','');
  if(hash){
    const c = cidades.find(ci=>ci.nome.toLowerCase().replace(/\s/g,'-')===hash);
    if(c){ mudarCidade(c); }
  }
}
window.addEventListener('load',verificarHash);

// Relógio atualizado
function atualizarRelogio(){
  const now = new Date();
  const time = now.toLocaleTimeString('pt-BR',{timeZone:cidadeAtual.tz});
  const date = now.toLocaleDateString('pt-BR',{timeZone:cidadeAtual.tz, weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('clock').textContent = time;
  document.getElementById('date').textContent = date;
}
setInterval(atualizarRelogio,1000);
atualizarRelogio();

</script>
