<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hora Certa em Brasília Agora (Atualizada)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Veja a hora certa em Brasília atualizada em tempo real. Relógio online com data e horário oficial do Brasil.">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f6f8;
  padding: 40px;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  font-size: 28px;
}

#clock {
  font-size: 48px;
  margin: 20px 0;
  font-weight: bold;
  color: #007bff;
}

#date {
  font-size: 18px;
  color: #555;
}

.footer {
  margin-top: 30px;
  font-size: 14px;
  color: #888;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hora Certa em Brasília</h1>
  
  <div id="clock"></div>
  <div id="date"></div>

  <p>Acompanhe a hora oficial de Brasília atualizada automaticamente.</p>
</div>

<div class="footer">
  Relógio online atualizado em tempo real
</div>

<script>
function updateClock() {
  const now = new Date();

  const optionsTime = {
    timeZone: 'America/Sao_Paulo',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  };

  const optionsDate = {
    timeZone: 'America/Sao_Paulo',
    weekday: 'long',
    day: '2-digit',
    month: 'long',
    year: 'numeric'
  };

  document.getElementById('clock').innerHTML =
    now.toLocaleTimeString('pt-BR', optionsTime);

  document.getElementById('date').innerHTML =
    now.toLocaleDateString('pt-BR', optionsDate);
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
