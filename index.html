<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="SEU_CODIGO_AQUI">

<title>Hora em Brasília | Relógio Mundial</title>
<meta name="description" content="Veja a hora em Brasília e horários do mundo com relógio online.">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: #0b1f3a;
  color: white;
}

/* MENU */
.sidebar {
  width: 220px;
  background: #08172b;
  height: 100vh;
  padding-top: 20px;
}

.sidebar h2 {
  text-align: center;
}

.menu-item {
  padding: 15px;
  cursor: pointer;
  border-bottom: 1px solid #0b1f3a;
}

.menu-item:hover {
  background: #0b1f3a;
}

/* CONTEÚDO */
.content {
  flex: 1;
  text-align: center;
  padding: 20px;
  overflow-y: auto;
}

/* 👇 AQUI É O AJUSTE */
.screen {
  display: none;
  margin-top: 80px; /* empurra tudo pra baixo */
}

.active {
  display: block;
}

/* RELÓGIO */
#clock {
  font-size: 90px;
  margin-top: 20px;
}

#date {
  font-size: 26px;
}

/* MUNDO */
.world-box {
  background: #08172b;
  padding: 15px 25px;
  border-radius: 10px;
  font-size: 18px;
  min-width: 140px;
}

/* CRONÔMETRO */
#stopwatch {
  font-size: 60px;
  margin: 30px;
}

/* BOTÕES */
button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
}

/* ANÚNCIO */
.ad {
  position: fixed;
  bottom: 0;
  left: 220px;
  right: 0;
  height: 100px;
  background: #08172b;
  text-align: center;
  line-height: 100px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Ferramentas</h2>
  <div class="menu-item" onclick="showScreen('clockScreen')">Relógio</div>
  <div class="menu-item" onclick="showScreen('stopwatchScreen')">Cronômetro</div>
  <div class="menu-item" onclick="showScreen('timerScreen')">Temporizador</div>
</div>

<div class="content">

<div id="clockScreen" class="screen active">
  <h1>Hora em Brasília</h1>
  <div id="clock">00:00:00</div>
  <div id="date"></div>

  <h2 style="margin-top:40px;">Horários pelo Mundo</h2>

  <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:20px;">
    <div class="world-box"><strong>Nova York</strong><br><span id="ny"></span></div>
    <div class="world-box"><strong>Londres</strong><br><span id="london"></span></div>
    <div class="world-box"><strong>Tóquio</strong><br><span id="tokyo"></span></div>
    <div class="world-box"><strong>Paris</strong><br><span id="paris"></span></div>
    <div class="world-box"><strong>Dubai</strong><br><span id="dubai"></span></div>
  </div>
</div>

<div id="stopwatchScreen" class="screen">
  <h1>Cronômetro</h1>
  <div id="stopwatch">00:00:00</div>
  <button onclick="startStopwatch()">Iniciar</button>
  <button onclick="pauseStopwatch()">Pausar</button>
  <button onclick="resetStopwatch()">Resetar</button>
</div>

<div id="timerScreen" class="screen">
  <h1>Temporizador</h1>
  <input type="number" id="minutes" placeholder="Minutos">
  <br><br>
  <button onclick="startTimer()">Iniciar</button>
  <div id="timerDisplay"></div>
</div>

</div>

<div class="ad">
  Espaço para anúncio
</div>

<script>
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function updateClock() {
  const now = new Date();

  function getTime(zone) {
    return now.toLocaleTimeString("pt-BR", { timeZone: zone });
  }

  document.getElementById("clock").textContent = getTime("America/Sao_Paulo");

  document.getElementById("date").textContent =
    now.toLocaleDateString("pt-BR", {
      timeZone: "America/Sao_Paulo",
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

  document.getElementById("ny").textContent = getTime("America/New_York");
  document.getElementById("london").textContent = getTime("Europe/London");
  document.getElementById("tokyo").textContent = getTime("Asia/Tokyo");
  document.getElementById("paris").textContent = getTime("Europe/Paris");
  document.getElementById("dubai").textContent = getTime("Asia/Dubai");
}

setInterval(updateClock, 1000);
updateClock();

/* CRONÔMETRO */
let swTime = 0;
let swInterval;

function startStopwatch() {
  swInterval = setInterval(() => {
    swTime++;
    document.getElementById("stopwatch").textContent =
      new Date(swTime * 1000).toISOString().substr(11, 8);
  }, 1000);
}

function pauseStopwatch() {
  clearInterval(swInterval);
}

function resetStopwatch() {
  clearInterval(swInterval);
  swTime = 0;
  document.getElementById("stopwatch").textContent = "00:00:00";
}

/* TEMPORIZADOR */
function startTimer() {
  let minutes = document.getElementById("minutes").value;
  let time = minutes * 60;

  let interval = setInterval(() => {
    if (time <= 0) {
      clearInterval(interval);
      alert("Tempo acabou!");
    }

    let min = Math.floor(time / 60);
    let sec = time % 60;

    document.getElementById("timerDisplay").textContent =
      min + ":" + (sec < 10 ? "0" + sec : sec);

    time--;
  }, 1000);
}
</script>

</body>
</html>
