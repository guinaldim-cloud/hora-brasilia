<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hora Atual no Mundo - Portal de Relógios</title>
<meta name="description" content="Veja a hora exata em tempo real em 100 cidades do mundo. Relógio gigante atualizado segundo a segundo.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial, sans-serif; text-align:center; background:#020617; color:white; padding:20px; margin:0; }
h1 { font-size:32px; margin-bottom:20px; }
#clock { font-size:90px; font-weight:bold; margin:20px 0; }
#date { font-size:20px; opacity:0.8; margin-bottom:30px; }
#menu { display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }
#menu button { margin:5px; padding:10px 15px; border:none; border-radius:6px; background:#0ea5e9; color:#000; cursor:pointer; font-size:14px; }
#menu button:hover { background:#38bdf8; }
.info { max-width:700px; margin:40px auto; opacity:0.8; line-height:1.5; }
footer { margin-top:50px; font-size:14px; opacity:0.6; }
@media(max-width:600px){#clock{font-size:55px;} #menu button{font-size:12px; padding:8px 12px;}}
</style>
</head>
<body>

<h1 id="titulo">Hora em Brasília Agora</h1>
<div id="clock">--:--:--</div>
<div id="date"></div>

<div id="menu"></div>

<div class="info">
Veja a hora exata em tempo real em 100 cidades do mundo. Clique no menu acima para mudar a cidade. Ideal para consultar horários globais rapidamente.
</div>

<footer>Portal de horários online</footer>

let cidadeAtual = cidades[0];

// Criar menu
const menu = document.getElementById('menu');
cidades.forEach(cidade=>{
  const btn = document.createElement('button');
  btn.textContent = cidade.nome;
  btn.onclick = ()=>{
    cidadeAtual = cidade;
    document.getElementById('titulo').textContent = "Hora em "+cidade.nome+" Agora";
    document.title = "Hora em "+cidade.nome+" Agora - Portal de Relógios";
    document.querySelector('meta[name="description"]').setAttribute('content',"Veja a hora exata em "+cidade.nome+" em tempo real. Relógio gigante online.");
    location.hash = cidade.nome.toLowerCase().replace(/\s/g,'-');
  };
  menu.appendChild(btn);
});

// Verifica hash ao carregar página
function verificarHash(){
  const hash = location.hash.replace('#','');
  if(hash){
    const c = cidades.find(ci=>ci.nome.toLowerCase().replace(/\s/g,'-')===hash);
    if(c){ cidadeAtual = c; document.getElementById('titulo').textContent = "Hora em "+c.nome+" Agora"; }
  }
}
window.addEventListener('load',verificarHash);

// Atualizar relógio
function atualizarRelogio(){
  const now = new Date();
  const time = now.toLocaleTimeString('pt-BR',{timeZone:cidadeAtual.tz});
  const date = now.toLocaleDateString('pt-BR',{timeZone:cidadeAtual.tz, weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('clock').textContent = time;
  document.getElementById('date').textContent = date;
}
setInterval(atualizarRelogio,1000);
atualizarRelogio();
